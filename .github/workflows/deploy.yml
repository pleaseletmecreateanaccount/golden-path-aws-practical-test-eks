##############################################################################
# Deploy Workflow — Infrastructure + Application
#
# Triggers:
#   • Push to main (auto-deploy)
#   • Manual (workflow_dispatch) for ad-hoc runs
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN          — IAM role ARN to assume (OIDC federation, no keys)
#   DB_PASSWORD           — DB password to store in Secrets Manager
#
# Required GitHub Variables:
#   AWS_REGION            — ap-southeast-1
#   AWS_ACCOUNT_ID        — 825566110381
#   TF_STATE_BUCKET       — golden-path-tfstate-825566110381
##############################################################################

name: 🚀 Deploy — Infrastructure & App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: "Skip Terraform (only redeploy app)"
        type: boolean
        default: false

permissions:
  id-token: write   # Required for OIDC → AWS role assumption (no static keys!)
  contents: read

env:
  AWS_REGION:      ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_ACCOUNT_ID:  ${{ vars.AWS_ACCOUNT_ID || '825566110381' }}
  TF_DIR:          terraform/environments/production
  CLUSTER_NAME:    golden-path-production
  APP_NAMESPACE:   golden-path
  # HELM_RELEASE must differ from chart name (golden-path) to avoid
  # double-name resources like golden-path-golden-path.
  # Using "app" produces clean names: app-golden-path → but we override
  # fullnameOverride so all resources are simply "golden-path".
  HELM_RELEASE:    golden-path
  HELM_CHART:      ./helm/golden-path
  # The fullname resources will be: golden-path (via fullnameOverride below)

jobs:
  ##############################################################################
  # Job 1 — Terraform Plan
  # Uses -target to plan AWS resources only.
  # Helm and Kubernetes providers fail at plan time when the cluster does not
  # exist yet because they try to authenticate during provider initialization.
  # The full Helm/K8s resources are applied in Stage 2 of the apply job.
  ##############################################################################
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_terraform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan (AWS resources only)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -target=module.vpc \
            -target=module.eks \
            -target=module.irsa \
            -target=aws_s3_bucket.app_data \
            -target=aws_s3_bucket_versioning.app_data \
            -target=aws_s3_bucket_server_side_encryption_configuration.app_data \
            -target=aws_s3_bucket_public_access_block.app_data \
            -target=aws_secretsmanager_secret.db_password \
            -target=aws_secretsmanager_secret_version.db_password \
            -target=aws_cloudwatch_dashboard.golden_signals \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -input=false
        env:
          TF_VAR_aws_region:     ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}

  ##############################################################################
  # Job 2 — Terraform Apply (Two-Stage)
  #
  # Stage 1: Apply AWS-only resources (VPC, EKS, IRSA, S3, Secrets Manager)
  #          Using -target to skip Helm/Kubernetes resources which need
  #          the cluster to already exist before their providers can auth.
  #
  # Stage 2: Full apply now that the cluster is live and Helm/K8s providers
  #          can authenticate successfully.
  ##############################################################################
  terraform-apply:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ !inputs.skip_terraform && github.ref == 'refs/heads/main' }}
    environment: production

    outputs:
      app_role_arn: ${{ steps.tf-outputs.outputs.app_role_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # ── Stage 1 — AWS infrastructure only ─────────────────────────────────
      # Apply VPC, EKS, IRSA, S3, Secrets Manager without touching
      # Helm/Kubernetes resources. These resources do not need the cluster
      # to exist and their providers don't try to connect to Kubernetes.
      - name: "Stage 1: Apply AWS infrastructure (EKS cluster + dependencies)"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -target=module.vpc \
            -target=module.eks \
            -target=module.irsa \
            -target=aws_s3_bucket.app_data \
            -target=aws_s3_bucket_versioning.app_data \
            -target=aws_s3_bucket_server_side_encryption_configuration.app_data \
            -target=aws_s3_bucket_public_access_block.app_data \
            -target=aws_secretsmanager_secret.db_password \
            -target=aws_secretsmanager_secret_version.db_password \
            -target=aws_cloudwatch_dashboard.golden_signals \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
        env:
          TF_VAR_aws_region:     ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}

      # ── Wait for cluster to be fully active before Stage 2 ────────────────
      - name: Wait for EKS cluster to be Active
        run: |
          echo "⏳ Waiting for EKS cluster to become Active..."
          aws eks wait cluster-active \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Cluster is Active"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Wait for nodes to be Ready
        run: |
          echo "⏳ Waiting for at least one node to be Ready..."
          for i in $(seq 1 20); do
            READY=$(kubectl get nodes --no-headers 2>/dev/null \
              | grep -c " Ready" || true)
            if [ "$READY" -gt 0 ]; then
              echo "✅ $READY node(s) Ready"
              kubectl get nodes
              break
            fi
            echo "Attempt $i/20 — no nodes ready yet, waiting 15s..."
            sleep 15
          done

      # ── Stage 2 — Full apply including Helm/Kubernetes resources ──────────
      # The cluster now exists and is reachable — Helm and Kubernetes
      # providers can authenticate and manage resources inside the cluster.
      - name: "Stage 2: Apply Helm addons and Kubernetes resources"
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
        env:
          TF_VAR_aws_region:     ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}

      - name: Capture Terraform Outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "app_role_arn=$(terraform output -raw app_irsa_role_arn)" >> "$GITHUB_OUTPUT"

  ##############################################################################
  # Job 3 — Deploy Application via Helm
  ##############################################################################
  deploy-app:
    name: 🎯 Deploy App (Helm)
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    if: |
      always() &&
      (needs.terraform-apply.result == 'success' || inputs.skip_terraform)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.APP_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for External Secrets Operator CRDs
        run: |
          echo "⏳ Waiting for ESO CRDs to be established..."
          kubectl wait --for=condition=established \
            crd/clustersecretstores.external-secrets.io \
            --timeout=120s

      - name: Apply ClusterSecretStore
        run: |
          kubectl apply -f k8s/cluster-secret-store.yaml

      - name: Wait for ClusterSecretStore to be ready
        run: |
          echo "⏳ Waiting for ClusterSecretStore to become ready..."
          for i in $(seq 1 12); do
            STATUS=$(kubectl get clustersecretstore aws-secretsmanager \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ "$STATUS" = "True" ]; then
              echo "✅ ClusterSecretStore is ready"
              break
            fi
            echo "Attempt $i/12 — status: ${STATUS:-pending} — waiting 10s..."
            sleep 10
          done

      - name: Get App IRSA Role ARN
        id: get-role
        run: |
          if [ -n "${{ needs.terraform-apply.outputs.app_role_arn }}" ]; then
            echo "role_arn=${{ needs.terraform-apply.outputs.app_role_arn }}" >> "$GITHUB_OUTPUT"
          else
            # Fallback: fetch from Terraform state directly
            cd ${{ env.TF_DIR }}
            terraform init -input=false -reconfigure
            echo "role_arn=$(terraform output -raw app_irsa_role_arn)" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm Upgrade / Install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.APP_NAMESPACE }} \
            --create-namespace \
            --timeout 5m \
            --set "fullnameOverride=golden-path" \
            --set "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=${{ steps.get-role.outputs.role_arn }}" \
            --set "image.tag=stable-alpine" \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/golden-path \
            -n ${{ env.APP_NAMESPACE }} \
            --timeout=5m

      - name: 🔍 Debug — ALB & Ingress Status
        if: always()
        run: |
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.APP_NAMESPACE }} -o wide

          echo "=== Ingress YAML ==="
          kubectl get ingress -n ${{ env.APP_NAMESPACE }} -o yaml

          echo "=== IngressClass ==="
          kubectl get ingressclass

          echo "=== ALB Controller Logs ==="
          kubectl logs -n kube-system \
            -l app.kubernetes.io/name=aws-load-balancer-controller \
            --tail=80

          echo "=== Pods ==="
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller

          echo "=== ExternalSecret Status ==="
          kubectl get externalsecret -n ${{ env.APP_NAMESPACE }} 2>/dev/null || echo "No ExternalSecrets found"

          echo "=== Subnet Tags (ALB discovery check) ==="
          aws ec2 describe-subnets \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Project,Values=golden-path" \
            --query 'Subnets[*].{ID:SubnetId,Tags:Tags[?Key==`kubernetes.io/role/elb`||Key==`kubernetes.io/role/internal-elb`||Key==`kubernetes.io/cluster/golden-path-production`]}' \
            --output table

      - name: ✅ Print ALB hostname
        run: |
          echo "⏳ Waiting up to 6 minutes for ALB to be provisioned..."
          for i in $(seq 1 24); do
            ADDRESS=$(kubectl get ingress golden-path \
              -n ${{ env.APP_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ADDRESS" ]; then
              echo ""
              echo "=============================================="
              echo "✅ Application is live at: http://$ADDRESS"
              echo "=============================================="
              # Write to GitHub Actions job summary so it's visible on the Actions page
              echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
              echo "**Application URL:** http://$ADDRESS" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Open this URL in your browser to access the nginx application." >> $GITHUB_STEP_SUMMARY
              break
            fi
            echo "Attempt $i/24 — ALB not ready yet, waiting 15s..."
            sleep 15
          done

          if [ -z "$ADDRESS" ]; then
            echo "⚠️  ALB hostname not available after 6 minutes."
            echo "Check the ALB Controller Logs in the debug step above."
            echo "## ⚠️ ALB Not Ready" >> $GITHUB_STEP_SUMMARY
            echo "The ALB hostname was not assigned within 6 minutes." >> $GITHUB_STEP_SUMMARY
            echo "Check the Debug step logs for ALB Controller errors." >> $GITHUB_STEP_SUMMARY
          fi
